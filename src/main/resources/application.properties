spring.application.name=platform-cicd-api

server.port=${SERVER_PORT:8082}

management.endpoints.web.exposure.include=health,info

platform.gitops.values-path=${PLATFORM_GITOPS_VALUES_PATH:../platform-deploy/environments/dev/values.yaml}
platform.runner.workspace-root=${PLATFORM_RUNNER_WORKSPACE_ROOT:build/cicd-workspaces}
platform.runner.timeout-seconds=${PLATFORM_RUNNER_TIMEOUT_SECONDS:30}
platform.runner.log-limit-bytes=${PLATFORM_RUNNER_LOG_LIMIT_BYTES:12000}
